<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#F7F7F7"/>
  <!-- Cooktop surface -->
  <rect x="20" y="35" width="160" height="120" rx="8" fill="#E8E8E8" stroke="#C0C0C0" stroke-width="2"/>
  <!-- Top-left burner -->
  <circle cx="65" cy="75" r="24" fill="none" stroke="#B0B0B0" stroke-width="2"/>
  <circle cx="65" cy="75" r="14" fill="none" stroke="#C0C0C0" stroke-width="1.5"/>
  <circle cx="65" cy="75" r="4" fill="#B8B8B8"/>
  <!-- Top-right burner -->
  <circle cx="135" cy="75" r="24" fill="none" stroke="#B0B0B0" stroke-width="2"/>
  <circle cx="135" cy="75" r="14" fill="none" stroke="#C0C0C0" stroke-width="1.5"/>
  <circle cx="135" cy="75" r="4" fill="#B8B8B8"/>
  <!-- Bottom-left burner (smaller) -->
  <circle cx="65" cy="125" r="18" fill="none" stroke="#B0B0B0" stroke-width="2"/>
  <circle cx="65" cy="125" r="10" fill="none" stroke="#C0C0C0" stroke-width="1.5"/>
  <circle cx="65" cy="125" r="4" fill="#B8B8B8"/>
  <!-- Bottom-right burner (smaller) -->
  <circle cx="135" cy="125" r="18" fill="none" stroke="#B0B0B0" stroke-width="2"/>
  <circle cx="135" cy="125" r="10" fill="none" stroke="#C0C0C0" stroke-width="1.5"/>
  <circle cx="135" cy="125" r="4" fill="#B8B8B8"/>
  <!-- Control knobs -->
  <circle cx="50" cy="176" r="7" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <circle cx="80" cy="176" r="7" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <circle cx="120" cy="176" r="7" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <circle cx="150" cy="176" r="7" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
</svg>
