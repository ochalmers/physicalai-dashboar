<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#F7F7F7"/>
  <!-- Oven body -->
  <rect x="25" y="20" width="150" height="170" rx="6" fill="#E8E8E8" stroke="#C0C0C0" stroke-width="2"/>
  <!-- Control panel -->
  <rect x="35" y="30" width="130" height="30" rx="4" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <!-- Control knobs -->
  <circle cx="60" cy="45" r="7" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <circle cx="100" cy="45" r="7" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <circle cx="140" cy="45" r="7" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <!-- Oven door -->
  <rect x="35" y="70" width="130" height="110" rx="4" fill="#D5D5D5" stroke="#B8B8B8" stroke-width="1.5"/>
  <!-- Door handle -->
  <rect x="75" y="76" width="50" height="6" rx="3" fill="#AAA"/>
  <!-- Oven glass window -->
  <rect x="50" y="92" width="100" height="75" rx="3" fill="#1A1A1A" opacity="0.12"/>
  <rect x="50" y="92" width="100" height="75" rx="3" fill="none" stroke="#B0B0B0" stroke-width="1.5"/>
</svg>